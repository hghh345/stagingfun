<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FUNFUNFUN.WORLD</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: Tahoma, Verdana, Arial, sans-serif;
  overflow-x: hidden;
}

body {
  background:
    linear-gradient(rgba(0, 70, 255, 0.08), rgba(255, 0, 180, 0.07)),
    url("windows.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #111;
}

/* scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 1px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 3px
  );
  z-index: 9999;
}

/* WINDOWS */
.window {
  position: absolute;
  background: #c0c0c0;
  border: 3px outset #fff;
  box-shadow: 5px 5px 0 rgba(0,0,0,0.35);
  z-index: 10;
}

.window-titlebar {
  background: #000080;
  color: white;
  padding: 4px 8px;
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.window-content {
  background: #ececec;
  margin: 4px;
  padding: 12px;
}

/* MIRROR */
.mirror-photo-wrap {
  width: 240px;
  height: 310px;
  margin: 20px auto;
  border: 10px ridge #ddd;
  border-radius: 18px 18px 55px 55px;
  overflow: hidden;
  background: white;
}

.mirror-photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.mirror-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.mirror-option {
  background: white;
  border: 2px inset #aaa;
  padding: 10px;
  text-align: center;
}

/* CART */
#cart-button {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
}

#cart-drawer {
  position: fixed;
  top: 0;
  right: -380px;
  width: 360px;
  height: 100%;
  background: white;
  transition: 0.3s;
  z-index: 9998;
  padding: 20px;
}

/* folder + extras */
.folder-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.folder-item {
  background: white;
  border: 2px inset #aaa;
  padding: 10px;
  text-align: center;
}

button { cursor: pointer; }

.hidden { display:none; }

</style>
</head>

<body>

<div class="scanlines"></div>

<!-- ================= MIRROR WINDOW ================= -->
<section class="window" id="mirrorWin" style="top:80px;left:60px;width:520px;">
  <div class="window-titlebar">MS Paint Mirror</div>

  <div class="window-content">

    <div class="mirror-photo-wrap">
      <img src="mirror1.JPG" class="mirror-photo">
    </div>

    <div class="mirror-options">
      <div class="mirror-option">
        <h3>Mini</h3>
        <button onclick="addToCart({id:'mini',name:'Mini Mirror',price:3500})">
          Add €35
        </button>
      </div>

      <div class="mirror-option">
        <h3>Big</h3>
        <button onclick="addToCart({id:'big',name:'Big Mirror',price:5500})">
          Add €55
        </button>
      </div>
    </div>

  </div>
</section>

<!-- ================= FOLDER WINDOW ================= -->
<section class="window" id="folderWin" style="top:120px;left:620px;width:420px;">
  <div class="window-titlebar">Shop Files</div>
  <div class="window-content">
    <div class="folder-grid">
      <div class="folder-item">🪞 Mirror</div>
      <div class="folder-item">👠 Shoes</div>
      <div class="folder-item">🔥 Lighters</div>
    </div>
  </div>
</section>

<!-- ================= MINESWEEPER ================= -->
<section class="window" id="mineWin" style="top:420px;left:60px;width:320px;">
  <div class="window-titlebar">minesweeper.exe</div>
  <div class="window-content">
    <button onclick="startMinesweeper()">Reset</button>
    <div id="board"></div>
  </div>
</section>

<!-- ================= CART ================= -->
<button id="cart-button">Cart (<span id="cart-count">0</span>)</button>

<div id="cart-drawer">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <p><strong>Total: €<span id="cart-total">0</span></strong></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* CART OPEN */
document.getElementById("cart-button").onclick = () => {
  const d = document.getElementById("cart-drawer");
  d.style.right = d.style.right === "0px" ? "-380px" : "0px";
};

/* ADD */
function addToCart(item){
  const found = cart.find(i => i.id === item.id);
  if(found) found.qty++;
  else cart.push({...item, qty:1});
  save();
}

/* SAVE */
function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
}

/* QTY */
function changeQty(i, d){
  cart[i].qty += d;
  if(cart[i].qty <= 0) cart.splice(i,1);
  save();
}

/* REMOVE */
function removeItem(i){
  cart.splice(i,1);
  save();
}

/* RENDER */
function render(){
  let total=0, count=0;
  const el=document.getElementById("cart-items");
  el.innerHTML="";

  cart.forEach((i,idx)=>{
    total+=i.price*i.qty;
    count+=i.qty;

    el.innerHTML+=`
      <div>
        <strong>${i.name}</strong><br>
        €${(i.price/100).toFixed(2)} x ${i.qty}<br>
        <button onclick="changeQty(${idx},-1)">-</button>
        <button onclick="changeQty(${idx},1)">+</button>
        <button onclick="removeItem(${idx})">x</button>
      </div>
      <hr>
    `;
  });

  document.getElementById("cart-count").textContent=count;
  document.getElementById("cart-total").textContent=(total/100).toFixed(2);
}

/* CHECKOUT (VERCEL ONLY) */
async function checkout(){
  const res = await fetch("/api/checkout", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      items: cart.map(i=>({
        name:i.name,
        price:i.price,
        quantity:i.qty
      }))
    })
  });

  const data = await res.json();

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Checkout error");
    console.log(data);
  }
}

/* MINESWEEPER SIMPLE */
function startMinesweeper(){
  const b=document.getElementById("board");
  b.innerHTML="";
  for(let i=0;i<12;i++){
    const cell=document.createElement("button");
    cell.textContent="□";
    b.appendChild(cell);
  }
}

startMinesweeper();
render();
</script>

</body>
</html>
