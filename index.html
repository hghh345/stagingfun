<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FUNFUNFUN.WORLD</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: Tahoma, Verdana, Arial, sans-serif;
  overflow-x: hidden;
}

body {
  background:
    linear-gradient(rgba(0, 70, 255, 0.08), rgba(255, 0, 180, 0.07)),
    url("windows.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #111;
}

.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 1px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 3px
  );
  z-index: 9999;
}

.window {
  position: absolute;
  background: #c0c0c0;
  border: 3px outset #fff;
  box-shadow: 5px 5px 0 rgba(0,0,0,0.35);
  width: 500px;
  z-index: 10;
}

.window-titlebar {
  background: #000080;
  color: white;
  padding: 4px 8px;
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.window-content {
  background: #ececec;
  margin: 4px;
  padding: 12px;
}

/* MIRROR */
.mirror-photo-wrap {
  width: 240px;
  height: 310px;
  margin: 20px auto;
  border: 10px ridge #ddd;
  border-radius: 18px 18px 55px 55px;
  overflow: hidden;
  background: white;
}

.mirror-photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.mirror-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.mirror-option {
  background: white;
  border: 2px inset #aaa;
  padding: 10px;
  text-align: center;
}

button { cursor: pointer; }

/* CART */
#cart-button {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
}

#cart-drawer {
  position: fixed;
  top: 0;
  right: -380px;
  width: 360px;
  height: 100%;
  background: white;
  transition: 0.3s;
  padding: 20px;
  z-index: 9998;
}
</style>
</head>

<body>

<div class="scanlines"></div>

<!-- DESKTOP ICONS (restored placeholder for your full system) -->
<div class="desktop-icons"></div>

<!-- MIRROR -->
<section class="window" style="top:80px;left:60px;">
  <div class="window-titlebar">MS Paint Mirror</div>

  <div class="window-content">

    <div class="mirror-photo-wrap">
      <img src="mirror1.JPG" class="mirror-photo">
    </div>

    <div class="mirror-options">
      <div class="mirror-option">
        <h3>Mini</h3>
        <button onclick="addToCart({id:'mini',name:'Mini Mirror',price:3500})">
          Add €35
        </button>
      </div>

      <div class="mirror-option">
        <h3>Big</h3>
        <button onclick="addToCart({id:'big',name:'Big Mirror',price:5500})">
          Add €55
        </button>
      </div>
    </div>

  </div>
</section>

<!-- CART -->
<button id="cart-button">Cart (<span id="cart-count">0</span>)</button>

<div id="cart-drawer">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <p><strong>Total: €<span id="cart-total">0</span></strong></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cart-button").onclick = () => {
  const d = document.getElementById("cart-drawer");
  d.style.right = d.style.right === "0px" ? "-380px" : "0px";
};

function addToCart(item){
  const found = cart.find(i => i.id === item.id);
  if(found) found.qty++;
  else cart.push({...item, qty:1});

  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
}

function changeQty(index, delta){
  cart[index].qty += delta;
  if(cart[index].qty <= 0) cart.splice(index,1);
  save();
}

function removeItem(index){
  cart.splice(index,1);
  save();
}

function render(){
  let total = 0;
  let count = 0;

  const el = document.getElementById("cart-items");
  el.innerHTML = "";

  cart.forEach((i,index)=>{
    total += i.price * i.qty;
    count += i.qty;

    el.innerHTML += `
      <div>
        <strong>${i.name}</strong><br>
        €${(i.price/100).toFixed(2)} x ${i.qty}
        <div>
          <button onclick="changeQty(${index},-1)">-</button>
          <button onclick="changeQty(${index},1)">+</button>
          <button onclick="removeItem(${index})">remove</button>
        </div>
      </div>
    `;
  });

  document.getElementById("cart-count").textContent = count;
  document.getElementById("cart-total").textContent = (total/100).toFixed(2);
}

async function checkout(){
  const btn = document.querySelector("#cart-drawer button");
  btn.textContent = "Redirecting...";
  btn.disabled = true;

  const res = await fetch("/api/checkout", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      items: cart.map(i=>({
        name:i.name,
        price:i.price,
        quantity:i.qty
      }))
    })
  });

  const data = await res.json();

  btn.textContent = "Checkout";
  btn.disabled = false;

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Checkout failed");
    console.log(data);
  }
}

render();
</script>

</body>
</html>
