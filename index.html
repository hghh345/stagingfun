<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FUNFUNFUN.WORLD</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: Tahoma, Verdana, Arial, sans-serif;
  overflow-x: hidden;
}

body {
  background:
    linear-gradient(rgba(0, 70, 255, 0.08), rgba(255, 0, 180, 0.07)),
    url("windows.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #111;
}

.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 1px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 3px
  );
  z-index: 9999;
}

.marquee-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #000080;
  color: white;
  border-bottom: 3px ridge #c0c0c0;
  height: 32px;
  display: flex;
  align-items: center;
  z-index: 3000;
  font-weight: bold;
  font-size: 14px;
}

marquee { width: 100%; }

.hidden { display:none; }

</style>
</head>

<body>

<div class="scanlines"></div>

<div class="marquee-bar">
  <marquee scrollamount="6">
    MIRROR MIRROR ON THE WALL ✦ FUNFUNFUN WORLD ✦ BUY THE MS PAINT MIRROR ✦
  </marquee>
</div>

<div class="desktop">

<section class="window mirror-window" id="mirrorWin">
  <div class="window-titlebar">
    <span>the-coolest-object.exe</span>
    <div class="window-buttons">
      <button class="win-btn" onclick="minimizeWindow(event,'mirrorWin')">_</button>
      <button class="win-btn">□</button>
      <button class="win-btn" onclick="closeWindow(event,'mirrorWin')">×</button>
    </div>
  </div>

  <div class="window-content">
    <div class="mirror-card">

      <div class="mirror-photo-wrap">
        <button class="gallery-btn prev" onclick="changeMirrorPhoto(-1)">‹</button>
        <img id="mirrorPhoto" src="mirror1.JPG" class="mirror-photo">
        <button class="gallery-btn next" onclick="changeMirrorPhoto(1)">›</button>
      </div>

      <h1>MS Paint Mirror</h1>

      <div class="mirror-options">
        <div class="mirror-option">
          <h3>Mini Mirror</h3>
          <button onclick="addToCart({id:'mirror-mini',name:'Mini Mirror',price:3500})">
            ADD MINI
          </button>
        </div>

        <div class="mirror-option featured">
          <h3>Big Mirror</h3>
          <button onclick="addToCart({id:'mirror-big',name:'Big Mirror',price:5500})">
            ADD BIG
          </button>
        </div>
      </div>

    </div>
  </div>
</section>

</div>

<button id="cart-button" style="position:fixed;top:20px;right:20px;z-index:9999;">
Cart (<span id="cart-count">0</span>)
</button>

<div id="cart-drawer" style="
position:fixed;
top:0;
right:-400px;
width:360px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.1);
padding:20px;
transition:0.3s;
z-index:9998;
overflow-y:auto;
">

  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <hr>
  <p><strong>Total: €<span id="cart-total">0</span></strong></p>

  <button style="width:100%;padding:12px;background:black;color:white;">
    Checkout
  </button>
</div>

<!-- ===== ALL JS CLEANED INTO ONE BLOCK ===== -->
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartDrawer = document.getElementById("cart-drawer");
const cartButton = document.getElementById("cart-button");
const cartItemsEl = document.getElementById("cart-items");
const cartCountEl = document.getElementById("cart-count");
const cartTotalEl = document.getElementById("cart-total");

// open cart
cartButton.onclick = () => {
  cartDrawer.style.right =
    cartDrawer.style.right === "0px" ? "-400px" : "0px";
};

// add to cart
function addToCart(product) {
  const existing = cart.find(i => i.id === product.id);
  if (existing) existing.qty++;
  else cart.push({...product, qty:1});

  saveCart();
  renderCart();
}

function removeItem(id){
  cart = cart.filter(i => i.id !== id);
  saveCart();
  renderCart();
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart(){
  cartItemsEl.innerHTML = "";
  let total = 0;
  let count = 0;

  cart.forEach(item=>{
    total += item.price * item.qty;
    count += item.qty;

    cartItemsEl.innerHTML += `
      <div>
        <strong>${item.name}</strong><br>
        €${(item.price/100).toFixed(2)} × ${item.qty}
        <button onclick="removeItem('${item.id}')">x</button>
      </div>
    `;
  });

  cartCountEl.textContent = count;
  cartTotalEl.textContent = (total/100).toFixed(2);
}

renderCart();
</script>

</body>
</html>
